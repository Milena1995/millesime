<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Millésime — Hors-ligne</title>
    <style>
      :root {
        color-scheme: light;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 1.5rem;
        padding-top: max(1.5rem, env(safe-area-inset-top));
        padding-bottom: max(1.5rem, env(safe-area-inset-bottom));
        text-align: center;
        background: #f5f1ea;
        color: #2b2521;
        font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      }
      h1 {
        margin: 0;
        color: #6b2737;
        font-family: Georgia, "Playfair Display", serif;
        font-size: 1.75rem;
      }
      p {
        margin: 0;
        max-width: 24rem;
        color: #8a7f71;
        font-size: 0.95rem;
        line-height: 1.5;
      }
      button {
        margin-top: 0.5rem;
        border: none;
        border-radius: 0.5rem;
        background: #6b2737;
        color: #f5f1ea;
        padding: 0.65rem 1.5rem;
        font-size: 0.95rem;
        font-weight: 500;
        cursor: pointer;
      }
      button:active {
        background: #531d2a;
      }
    </style>
  </head>
  <body>
    <h1>Millésime</h1>
    <p>
      Vous êtes hors-ligne. La cave que vous avez déjà consultée reste peut-être disponible via
      le bouton « Retour » de votre navigateur — sinon reconnectez-vous pour y accéder.
    </p>
    <button onclick="location.reload()">Réessayer</button>
  </body>
</html>
